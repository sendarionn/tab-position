<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tab-position</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <div class="logo" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
        <div>
          <h1>tab-position</h1>
          <p>新しいタブを開く位置</p>
        </div>
      </header>

      <form id="position-form">
        <label class="option">
          <input type="radio" name="position" value="left" />
          <span class="visual visual-left" aria-hidden="true"></span>
          <span class="copy">
            <strong>左端</strong>
            <small>固定タブのすぐ右に開きます</small>
          </span>
          <span class="check" aria-hidden="true"></span>
        </label>

        <label class="option">
          <input type="radio" name="position" value="before-current" />
          <span class="visual visual-before" aria-hidden="true"></span>
          <span class="copy">
            <strong>現在のタブの左</strong>
            <small>今見ているタブの左隣に開きます</small>
          </span>
          <span class="check" aria-hidden="true"></span>
        </label>

        <label class="option">
          <input type="radio" name="position" value="after-current" />
          <span class="visual visual-after" aria-hidden="true"></span>
          <span class="copy">
            <strong>現在のタブの右</strong>
            <small>今見ているタブの右隣に開きます</small>
          </span>
          <span class="check" aria-hidden="true"></span>
        </label>

        <label class="option">
          <input type="radio" name="position" value="right" />
          <span class="visual visual-right" aria-hidden="true"></span>
          <span class="copy">
            <strong>右端</strong>
            <small>タブ一覧のいちばん右に開きます</small>
          </span>
          <span class="check" aria-hidden="true"></span>
        </label>
      </form>

      <p id="status" role="status" aria-live="polite">設定は自動で保存されます</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
